name: kyc-workflow
description: >
  KYC (Know Your Customer) workflow business logic for loan applications.
  This is a project-agnostic skill describing the standard 5-6 step KYC process,
  field semantics, API patterns, caching strategies, and implementation principles.
  It does NOT contain project-specific field names, file paths, or UI framework details.

  Key principle: Always read API KDoc comments to understand field semantics,
  never hardcode field names. Adapt the business logic to your project's
  specific interface definitions.

  v3.0 新增:
  - 信用信息步骤标记为可选（由后端配置控制）
  - 人脸识别三方渠道标记为可选
  - 拍照/图库选择 + 图片压缩参考代码（含崩溃/ANR风险分析要点）
  - KYC字段配置策略：硬编码 vs 接口驱动（两种方案可选）
  - 通用选择弹窗和输入框生成能力
  - 接口自动扫描与语义匹配能力
version: "3.0.0"
author: Claude

# Reference documentation
references:
  - references/kyc-workflow.md

