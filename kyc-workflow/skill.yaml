# Capabilities
capabilities:
  # ============ Setup Mode ============
  # Interactive questioning
  - 7问交互式确认: UI框架(Compose/View/混合)、步骤范围、字段策略(硬编码/接口驱动/混用)、接口状态、人脸渠道、银行卡模式(KYC/外部)、人脸模式(KYC/非KYC)
  - 问询完毕后输出整体计划摘要 (实现哪些步骤、各自特性、将创建的文件清单)
  # Per-step generation
  - 逐步骤执行: 读模板理解业务 → 展示流程摘要(操作序列+接口时序+交互规则) → 用户确认 → 扫描项目架构 → 适配生成代码
  - 每步流程摘要包含: 用户操作序列、接口调用时机和参数、关键交互规则(挽留弹窗/确认弹窗/级联逻辑/调用顺序)
  # Project adaptation
  - 自动扫描项目 API Service 文件, 按语义匹配 KYC 相关接口 (通过 agents/kyc-scanner.md 子代理)
  - 按项目架构适配生成代码 (复用现有 ViewModel 基类、网络请求封装、导航方式)
  # Knowledge delivery
  - 解释 KYC 标准流程的业务逻辑（5 步必选 + 1 步可选: 信用信息）
  - 说明每个步骤需要收集的信息和字段语义
  - 解释如何通过接口 KDoc 注释理解字段含义（不硬编码字段名）
  - 说明字段配置的两种策略（硬编码 vs 接口驱动）及其适用场景和判断标准

  # ============ Verify Mode ============
  - 接口存在性检查 (submitAcqData/ocrVerify/faceCompare/acpElementInfo/bankList/dictList/areaList)
  - 缓存模型安全检查 (字段是否全可空? 是否有 try/catch? 是否按账号隔离?)
  - 图片处理检查 (ImageCompressor 是否存在? 是否在 Dispatchers.IO 执行? 是否有 Coil/Glide 回显?)
  - UI组件复用检查 (是否有通用 OptionSelectDialog? 是否存在每字段独立 Dialog 的反模式?)
  - 挽留弹窗检查 (每个 KYC 步骤是否拦截返回键? 人脸非KYC模式是否跳过了挽留?)
  - 编译验证 (./gradlew compileDebugKotlin)
  - 每步输出 PASS/FAIL/WARN + 详细修复建议 (不自动修复)

  # ============ Knowledge Base ============
  # Core flow
  - KYC 标准5-6步流程业务语义 (个人信息/联系人/身份证/银行卡/信用信息/人脸识别)
  - 步骤可选性判断: 信用信息由后端 acpElementInfo 配置控制, 人脸三方渠道可选
  # Dictionary & Cache
  - 字典系统三级缓存策略 (内存 ConcurrentHashMap → 本地 DataStore 24h TTL → 网络接口) + 测试模式 + 硬编码回退方案
  - 表单缓存机制 (24h TTL + 账号隔离 + 防抖写入 + onPause flush)
  - 缓存序列化安全: 所有字段必须可空 + 默认值 null + 防御式 try/catch 读写
  # Image
  - 图片处理规范: 两步解码(bounds+ByteArray) + 内存预算校验 + 质量循环 + 降分辨率兜底
  - 图片压缩必须在 Dispatchers.IO 执行, 失败返回 null 不抛异常
  - 图片回显使用 Coil/Glide 加载 URI, 禁止 BitmapFactory.decode 原图
  - 拍照和图库选择统一封装 (项目中只存在一套图片获取逻辑)
  # Face
  - 人脸渠道适配: 自研 CameraX 兜底 + Face++ 三方 SDK 可选 + 自动降级机制
  - Face++ 流程: getToken → FaceSdkTools.startFaceTanCheck → CompletableDeferred(60s timeout) → faceCompare
  - 降级条件: Token 为空/超时/SDK errToYc 回调/用户取消
  # Bank & Face dual mode
  - 银行卡双模式: KYC步骤模式(submitAcqData t3e8L=4 + 缓存) vs 外部添加模式(submitBankCard + popBackStack)
  - 人脸非KYC模式: isKyc=false → 跳过挽留弹窗 + 结果通过 savedStateHandle 回传
  # UI
  - 通用选择弹窗: 单一 OptionSelectDialog 服务所有字典字段, 禁止 EducationDialog/MaritalDialog 等
  - 通用确认弹窗: 只读表单 + 确认/修改双按钮 + canceledOnTouchOutside=false
  - 通用挽留弹窗: 每个步骤拦截返回键, 降低用户流失
  - 控件封装原则: 与业务解耦、与样式解耦、统一接口
  # API & Config
  - 进件数据提交通用模式 (步骤标识 t3e8L=1-6) + 字段命名原则 (混淆字段 + KDoc 语义)
  - 接口自动扫描与语义匹配: submit/ocr/face/bank/dict/area/element/progress 10类识别规则
  - 9类接口占位代码 (后端未就绪时使用, 保证流程代码可编译)
  - 字段配置双策略 (方案A硬编码 vs 方案B接口驱动) 对比 + 混用推荐 + 判断标准
  # Design
  - 21条关键设计原则 + 29项实现检查清单
  - 10-12条常见陷阱 (症状→诊断→修复映射表)
