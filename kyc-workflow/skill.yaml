name: kyc-workflow
description: >
  Android/Kotlin 项目通用 KYC 进件流程技能。
  交互式问询模式 (Setup Mode): 7问确认需求 → 逐步骤展示业务流程摘要 → 用户确认 → 适配项目架构生成代码。
  验证模式 (Verify Mode): 6步检查清单审计存量KYC实现质量，输出 PASS/FAIL/WARN + 修复建议。

  核心原则: 总是先读 API KDoc 注释理解字段语义，不硬编码字段名。
  业务流程适配项目具体接口定义。

  v4.0 升级:
  - 新增 SKILL.md 主入口 + 双向模式 (Setup / Verify)
  - 7问交互式问询: UI框架、步骤范围、字段策略、接口状态、人脸渠道、银行卡模式、人脸模式
  - 逐步骤生成: 读模板理解业务 → 展示流程摘要 → 用户确认 → 适配项目架构生成代码
  - 模板定位为教学参考 (业务流程+交互时机), 非占位符替换生成器
  - 拆分单体文档为 16 个 topic 文件 (步骤级 + 主题级)
  - 新增 13 个代码模板 (state+viewmodel 合并, 关键交互点 ⚠️ 注释标注)
  - 新增接口扫描子代理 (agents/kyc-scanner.md)
  - 新增自动化验证脚本 (scripts/verify-kyc.sh)
  - 新增故障排查陷阱指南 (references/traps.md)
  - 新增验证流程文档 (references/verify.md)
